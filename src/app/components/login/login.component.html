<section class="min-h-screen text-white pt-28 pb-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md mx-auto">
    <div class="mb-8">
      <h1 class="text-2xl sm:text-3xl font-bold">
        {{ mode === 'login' ? 'Welcome back' : 'Create account' }}
      </h1>
      <p class="text-sm text-gray-400 mt-1">
        {{ mode === 'login'
          ? 'Log in to sync your Luscreens account.'
          : 'Sign up with email to get started.' }}
      </p>
    </div>

    <div
      *ngIf="!apiEnabled"
      class="rounded-xl border border-amber-500/30 bg-amber-500/10 p-4 text-sm text-amber-100 mb-4"
    >
      Auth API is not configured. Deploy <code class="text-amber-200">auth-api</code> on Render
      and set <code class="text-amber-200">authApiUrl</code>.
    </div>

    <div class="flex rounded-md overflow-hidden border border-white/15 mb-5">
      <button
        type="button"
        (click)="setMode('login')"
        class="flex-1 px-3 py-2 text-sm font-medium transition"
        [ngClass]="mode === 'login' ? 'bg-red-600 text-white' : 'bg-transparent text-gray-300 hover:bg-white/5'"
      >
        Log in
      </button>
      <button
        type="button"
        (click)="setMode('register')"
        class="flex-1 px-3 py-2 text-sm font-medium transition"
        [ngClass]="mode === 'register' ? 'bg-red-600 text-white' : 'bg-transparent text-gray-300 hover:bg-white/5'"
      >
        Sign up
      </button>
    </div>

    <form (ngSubmit)="submit()" class="space-y-4 rounded-xl border border-white/10 bg-black/40 p-5">
      <div *ngIf="mode === 'register'" class="space-y-1.5">
        <label for="auth-name" class="block text-xs text-gray-400">Name</label>
        <input
          id="auth-name"
          type="text"
          [(ngModel)]="name"
          name="name"
          autocomplete="name"
          placeholder="Your name"
          class="w-full px-3 py-2.5 text-sm bg-transparent border border-white/20 rounded-md focus:outline-none focus:border-red-600"
        />
      </div>

      <div class="space-y-1.5">
        <label for="auth-email" class="block text-xs text-gray-400">Email</label>
        <input
          id="auth-email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          placeholder="you@email.com"
          class="w-full px-3 py-2.5 text-sm bg-transparent border border-white/20 rounded-md focus:outline-none focus:border-red-600"
        />
      </div>

      <div class="space-y-1.5">
        <label for="auth-password" class="block text-xs text-gray-400">Password</label>
        <input
          id="auth-password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
          [attr.autocomplete]="mode === 'login' ? 'current-password' : 'new-password'"
          placeholder="At least 6 characters"
          class="w-full px-3 py-2.5 text-sm bg-transparent border border-white/20 rounded-md focus:outline-none focus:border-red-600"
        />
      </div>

      <p *ngIf="error" class="text-sm text-red-400">{{ error }}</p>

      <button
        type="submit"
        [disabled]="loading || !apiEnabled || !email || !password"
        class="w-full px-3 py-2.5 rounded-md bg-red-600 hover:bg-red-500 disabled:opacity-50 text-sm font-medium transition"
      >
        {{ loading
          ? (mode === 'login' ? 'Logging in…' : 'Creating account…')
          : (mode === 'login' ? 'Log in' : 'Create account') }}
      </button>
    </form>
  </div>
</section>
