<section class="min-h-screen text-white pt-28 pb-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-6xl mx-auto">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-8">
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold">Watchlist</h1>
        <p class="text-sm text-gray-400 mt-1">Titles you saved for later. Stored on this device.</p>
      </div>
      <button
        *ngIf="items.length > 0"
        type="button"
        (click)="clearAll()"
        class="px-3 py-1.5 text-sm rounded-md border border-white/20 hover:bg-white/10 transition"
      >
        Clear all
      </button>
    </div>

    <div *ngIf="items.length === 0" class="rounded-xl border border-white/10 bg-black/40 p-10 text-center">
      <p class="text-gray-300">Your watchlist is empty.</p>
      <p class="text-sm text-gray-500 mt-2">Open a title and tap “Add to Watchlist” to save it here.</p>
      <a routerLink="/" class="inline-block mt-5 text-sm text-red-400 hover:text-red-300">Browse home</a>
    </div>

    <div *ngIf="items.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
      <div *ngFor="let item of items" class="group relative rounded-lg overflow-hidden bg-black/40 border border-white/10">
        <a [routerLink]="detailsLink(item)" class="block">
          <img
            [src]="item.posterPath
              ? 'https://image.tmdb.org/t/p/w500' + item.posterPath
              : (item.backdropPath
                ? 'https://image.tmdb.org/t/p/w500' + item.backdropPath
                : 'assets/fallback.jpg')"
            [alt]="item.title"
            class="w-full aspect-[2/3] object-cover group-hover:scale-105 transition-transform duration-300"
            loading="lazy"
          />
          <div class="p-3 space-y-1">
            <h2 class="text-sm font-semibold line-clamp-2">{{ item.title }}</h2>
            <p class="text-[11px] text-gray-400">{{ item.mediaType === 'tv' ? 'Series' : 'Movie' }}</p>
          </div>
        </a>
        <button
          type="button"
          (click)="remove(item, $event)"
          class="absolute top-2 right-2 p-1.5 rounded-full bg-black/70 text-gray-300 hover:text-white opacity-0 group-hover:opacity-100 transition"
          title="Remove from watchlist"
          aria-label="Remove from watchlist"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18" />
            <path d="M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
