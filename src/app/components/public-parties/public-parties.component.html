<section class="min-h-screen text-white pt-28 pb-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-3xl mx-auto">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-8">
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold">Public watch parties</h1>
        <p class="text-sm text-gray-400 mt-1">
          Join an open party and watch together in sync.
        </p>
      </div>
      <button
        type="button"
        (click)="refresh()"
        class="px-3 py-1.5 text-sm rounded-md border border-white/20 hover:bg-white/10 transition"
      >
        Refresh
      </button>
    </div>

    <div
      *ngIf="!partyLobby.enabled"
      class="rounded-xl border border-amber-500/30 bg-amber-500/10 p-6 text-sm text-amber-100"
    >
      Lobby API is not configured. Set <code class="text-amber-200">partyApiUrl</code> and redeploy.
    </div>

    <div
      *ngIf="partyLobby.enabled && loading && rooms.length === 0"
      class="rounded-xl border border-white/10 bg-black/40 p-10 text-center text-gray-400"
    >
      Loading public parties…
    </div>

    <div
      *ngIf="partyLobby.enabled && !loading && rooms.length === 0"
      class="rounded-xl border border-white/10 bg-black/40 p-10 text-center"
    >
      <p class="text-gray-300">No public parties right now.</p>
      <p class="text-sm text-gray-500 mt-2">
        Start one from any title: open Watch party → Create → Public.
      </p>
      <a routerLink="/" class="inline-block mt-5 text-sm text-red-400 hover:text-red-300">
        Browse home
      </a>
    </div>

    <ul *ngIf="rooms.length > 0" class="space-y-3">
      <li *ngFor="let room of rooms">
        <button
          type="button"
          (click)="joinRoom(room)"
          [disabled]="joiningCode === room.code"
          class="w-full text-left rounded-xl border border-white/10 bg-black/40 hover:border-white/25 hover:bg-white/5 px-4 py-4 transition disabled:opacity-50"
        >
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="flex flex-wrap items-center gap-2">
                <code class="text-sm tracking-[0.2em] font-semibold text-white">
                  {{ room.code }}
                </code>
                <span class="text-[10px] uppercase tracking-wide px-2 py-0.5 rounded-full bg-emerald-600/25 text-emerald-300">
                  Public
                </span>
              </div>
              <p class="mt-1.5 text-base font-medium text-white truncate">
                {{ room.title || 'Untitled' }}
              </p>
              <p class="mt-1 text-xs text-gray-400">
                Hosted by {{ room.hostName }} · {{ episodeLabel(room) }} ·
                {{ room.memberCount }} watching
              </p>
            </div>
            <span class="shrink-0 text-sm font-medium text-red-400">
              {{ joiningCode === room.code ? 'Joining…' : 'Join' }}
            </span>
          </div>
        </button>
      </li>
    </ul>
  </div>
</section>
